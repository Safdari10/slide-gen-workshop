services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile # backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env # ← .env lives in backend/
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile # frontend/Dockerfile
    ports:
      - "3000:80" # nginx serves on port 80 inside
    depends_on:
      - backend
    restart: unless-stopped
